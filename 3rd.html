<!DOCTYPE html>
<html>
<head>
  <title>Student Cards</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; }
    .card {
      width: 220px; background:#fff; padding:15px;
      border-radius:8px; box-shadow:0 3px 6px rgba(0,0,0,.2);
      margin:10px; display:inline-block; text-align:center;
    }
    img { width:80px; height:80px; border-radius:50%; }
  </style>
</head>
<body>

<div id="students"></div>

<script>
  const data = [
    {name:"Alice", major:"CS", year:"2nd"},
    {name:"Bob", major:"ME", year:"4th"}
  ];

  document.getElementById("students").innerHTML =
    data.map(s => `
      <div class="card">
        <img src="https://i.pravatar.cc/80">
        <h3>${s.name}</h3>
        <p>${s.major}</p>
        <p>${s.year} Year</p>
      </div>
    `).join("");
</script>

</body>
</html>
